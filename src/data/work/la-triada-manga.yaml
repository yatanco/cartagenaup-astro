local_note: "One of the few places in Cartagena that opens at 7am — rare and worth knowing. Movistar fiber gives it the fastest WiFi we've tested in the city: 372 down / 141 up. OK coffee, solid breakfast, quiet until lunchtime. A few outlets inside near the wall. In Manga, a quieter residential neighborhood away from the tourist center — worth the trip. Fuerte de Pastelillo is a short walk away if you need to stretch between sessions. Colombian flags, unpretentious local vibe."
