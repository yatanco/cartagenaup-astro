local_note: "The library inside the Centro de Formación de la Cooperación Española — a colonial cloister on Plaza Santo Domingo that most visitors walk past without realizing it's open to the public. High wooden ceilings, floor-to-ceiling bookshelves, large study tables, and an atmosphere of genuine quiet. WiFi is solid at 41/45 Mbps. Free to use as a workspace. There's a café inside for coffee. One of the most beautiful places to work in the historic center, and almost nobody knows you can just walk in and sit down. Verified by Adri."
local_note_es: "La biblioteca dentro del Centro de Formación de la Cooperación Española — un claustro colonial en la Plaza Santo Domingo que la mayoría de visitantes pasa de largo sin saber que está abierto al público. Techos de madera altos, estanterías del piso al techo, mesas de estudio amplias y un ambiente de silencio real. WiFi sólido: 41/45 Mbps. De uso gratuito como espacio de trabajo. Hay una cafetería adentro. Uno de los lugares más hermosos para trabajar en el centro histórico, y casi nadie sabe que puedes entrar y sentarte. Verificado por Adri."
