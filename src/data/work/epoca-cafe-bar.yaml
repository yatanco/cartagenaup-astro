local_note: "One of the most beautiful spaces to work from in the historic center. Cathedral ceilings, checkered floors, natural light through arched windows, and a backlit bar wall that makes the whole room feel warm even in the morning. Specialty 100% Colombian coffee is the draw — serious coffee program. Music stays at a level that lets you concentrate, though it gets more lively as the day goes on. Full brunch menu means you can settle in for a long session."
local_note_es: "Uno de los espacios más hermosos para trabajar en el centro histórico. Techos catedrales, pisos de damero, luz natural por ventanas en arco y una barra iluminada que le da calidez al ambiente desde la mañana. Café de especialidad 100% colombiano como protagonista. La música tiene el volumen justo para concentrarse, aunque el ambiente se anima más avanzado el día. El menú de desayunos y brunch permite quedarse varias horas."
