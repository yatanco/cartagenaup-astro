local_note: "A family favorite. Quaint, colorful, walls covered in local art. Serves breakfast through to late night, hosts events, plays great music. The fastest WiFi measured on this site so far — 531 down / 386 up. Tables are just big enough to work on and it's genuinely quiet in the morning. Stick around all day and you'll probably end up talking to someone — this is a place where work has a way of turning into conversation, and conversation into a small party. AC is good, a few outlets available, but it gets lively past the morning."
