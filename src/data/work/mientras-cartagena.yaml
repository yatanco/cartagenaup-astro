local_note: "A family favorite. Quaint, colorful, walls covered in local art. Serves breakfast through to late night, hosts events, plays great music. The fastest WiFi measured on this site so far — 531 down / 386 up. Tables are just big enough to work on and it's genuinely quiet in the morning. Stick around all day and you'll probably end up talking to someone — this is a place where work has a way of turning into conversation, and conversation into a small party. AC is good, a few outlets available, but it gets lively past the morning."
local_note_es: "Un lugar favorito de la familia. Pintoresco, colorido, paredes cubiertas de arte local. Sirve desayuno hasta la noche, organiza eventos, tiene excelente música. El WiFi más rápido medido en este sitio hasta ahora — 531 de bajada / 386 de subida. Las mesas son justo del tamaño suficiente para trabajar y es genuinamente tranquilo en la mañana. Quédate todo el día y probablemente termines hablando con alguien — este es un lugar donde el trabajo tiende a convertirse en conversación, y la conversación en una pequeña fiesta. El aire acondicionado es bueno, hay algunos enchufes disponibles, pero se anima después de la mañana."
