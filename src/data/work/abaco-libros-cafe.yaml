local_note: "One of Cartagena's most iconic cultural spaces — a proper bookshop café with floor-to-ceiling shelves, exposed brick arches, cobalt blue walls, and jazz playing at just the right volume. The atmosphere is genuinely different from anywhere else in the walled city. WiFi is solid at 45/41 Mbps. The honest caveat: outlets are essentially non-existent, so bring a fully charged laptop and a power bank. Not a place for marathon work sessions, but perfect for two to three focused hours surrounded by books."
local_note_es: "Uno de los espacios culturales más emblemáticos de Cartagena — una librería-cafetería con estantes del suelo al techo, arcos de ladrillo expuesto, paredes azul cobalto y jazz al volumen justo. El ambiente es genuinamente distinto a cualquier otro lugar en la ciudad amurallada. El WiFi es sólido: 45/41 Mbps. La advertencia honesta: los enchufes son prácticamente inexistentes, así que trae el portátil cargado y un power bank. No es un lugar para sesiones maratónicas, pero es perfecto para dos o tres horas de trabajo enfocado rodeado de libros."
