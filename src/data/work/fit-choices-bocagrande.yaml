local_note: "Health food café next to a medical centre in Bocagrande — bamboo-lined interior, live-edge wood tables, relaxed vibe. The shakes are excellent, food is decent. Ground floor has outlets via an extension cord they'll give you on request. The real discovery: an upstairs space that's generally empty, has plenty of outlets, and gets solid WiFi. 192 Mbps down / 36 Mbps up. A quiet Bocagrande option that most people walk past."
local_note_es: "Café de comida saludable junto a un centro médico en Bocagrande — interior con bambú, mesas de madera maciza, ambiente relajado. Los batidos son excelentes, la comida está bien. La planta baja tiene enchufes mediante una extensión que dan al pedirla. El descubrimiento real: un espacio en el piso de arriba que generalmente está vacío, tiene muchos enchufes y buena señal WiFi. 192 Mbps de bajada / 36 Mbps de subida. Una opción tranquila en Bocagrande que la mayoría pasa de largo."
