local_note: "A neighborhood favorite I come back to often. Two comfy couches and a few less comfortable tables — it's primarily a coffee spot, not built for laptop marathons, but the couches work well for a few hours. There's also a small terrace right on the street if you want fresh air. Coffee is excellent, frappés are great (the Milo frappé is a hit if you bring kids). Internet is solid, AC is good, service is genuinely great. Quietish in the mornings and afternoons."
