local_note: "Striking space with a stacked shipping-container feature wall and double-height ceilings facing the beach. You can realistically leave your laptop here and go for a swim — beach access is steps away. The dedicated coworking floor is currently occupied by the Secretaría de Turismo; the public coffee area has two sofas and six four-person tables with strong AC and plenty of outlets. A second Concreto coworking space is opening on the mall's second floor around July 2026 — worth checking back. Slightly awkward to find: enter from outside the mall, take the left front stairs."
