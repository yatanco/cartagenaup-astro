local_note: "The open courtyard café of the Alianza Colombo Francesa, on one of the most beautiful squares in the historic center — Plaza Fernández de Madrid. White colonial arches, string lights, vines overhead, tables in a peaceful patio. The WiFi is exceptional: 367 Mbps down / 262 Mbps up on Movistar fiber. No AC so the heat is a factor — mornings and early afternoons are the sweet spot. Outlets are available on one side of the courtyard, limited on the other. A wanderer's work spot: drop in for a few hours while exploring the center, connect fast, enjoy the setting. Also has a public library inside. One of the most photogenic places to work in Cartagena."
local_note_es: "El café de patio abierto de la Alianza Colombo Francesa, en una de las plazas más hermosas del centro histórico — Plaza Fernández de Madrid. Arcos coloniales blancos, luces colgantes, enredaderas en el techo, mesas en un patio tranquilo. El WiFi es excepcional: 367 Mbps de bajada / 262 Mbps de subida en fibra Movistar. Sin aire acondicionado, así que el calor es un factor — las mañanas y primeras horas de la tarde son el mejor momento. Hay enchufes disponibles en un lado del patio, limitados en el otro. Ideal para trabajar unas horas mientras se recorre el centro. También tiene biblioteca pública adentro. Uno de los lugares más fotogénicos para trabajar en Cartagena."
