local_note: "A comfortable Getsemaní café with a travel theme and a large world map that gives the space a bit of perspective. I’ve been several times, usually in the morning, and it has never felt overly full. The coffee is good, though a bit pricey. Staff are nice, outlets are available almost everywhere, and the WiFi test was excellent at 343.62 Mbps down / 321.85 Mbps up with 24 ms ping. This is one of the stronger options for video-related work in Getsemaní."

local_note_es: "Un café cómodo en Getsemaní con temática viajera y un mapa grande del mundo que le da al lugar una sensación de perspectiva. He ido varias veces, normalmente en la mañana, y nunca lo he encontrado demasiado lleno. El café es bueno, aunque algo costoso. El personal es amable, hay enchufes casi en todas partes y la prueba de WiFi fue excelente: 343.62 Mbps de descarga / 321.85 Mbps de subida con 24 ms de ping. Es una de las mejores opciones en Getsemaní para trabajo con video o tareas que necesitan buena conexión."

