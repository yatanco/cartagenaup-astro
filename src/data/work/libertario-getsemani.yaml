local_note: "A Getsemaní classic. The coffee program is outstanding — one of the strongest menus in the city. Golden Milk is available here, which is rare in Cartagena. The WiFi is fiber but appears throttled, giving around 47/48 Mbps. Tables are small — not ideal for a dual-monitor setup. Outlets available but not at every table. The main trade-off: the music gets loud, which makes calls difficult. Come for the coffee and focused morning work, not for back-to-back video meetings."
local_note_es: "Un clásico de Getsemaní. La oferta de café es sobresaliente — uno de los mejores menús de la ciudad. El Golden Milk está disponible, lo cual es poco común en Cartagena. El WiFi es fibra óptica pero parece throttleado, dando alrededor de 47/48 Mbps. Las mesas son pequeñas — no es ideal para un setup de monitor dual. Hay enchufes disponibles pero no en cada mesa. El principal trade-off: la música sube de volumen, lo que dificulta las llamadas. Ven por el café y trabajo enfocado en la mañana, no para reuniones de video consecutivas."
