notes: "Taller presencial con Carlos Zabaleta, historiador de la Universidad de Cartagena. Explora la historia de las boticas coloniales de Cartagena y su relación con el origen de la Kola Román, una de las primeras gaseosas del país y la bebida más querida del Caribe colombiano. Gratuito con inscripción previa."
notes_en: "Workshop with historian Carlos Zabaleta (Universidad de Cartagena). The story of how Cartagena's colonial pharmacies — where doctors mixed medicines from plants, animals and minerals — gave rise to Kola Román, one of Colombia's first carbonated drinks and still the most beloved soft drink in the Colombian Caribbean. Free, registration required at banrepcultural.org."
