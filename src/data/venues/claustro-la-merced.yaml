description: "A former 17th-century convent turned García Márquez memorial and active cultural space, run by the Observatorio del Patrimonio Cultural (OPC) of the Universidad de Cartagena. Houses the Librería Remedios la Bella (FCE Colombia), Fruto Bendito café, a permanent García Márquez memorial with his ashes and personal objects, and rotating artistic exhibitions. One of Cartagena's most active free cultural programming spaces — the Espacio Cultural runs readings, concerts, book presentations, workshops, craft fairs, and reading clubs throughout the month. Open Monday to Saturday, 9am–12pm and 2pm–6pm. Free entry. Also a verified work spot."
description_es: "Un antiguo convento del siglo XVII convertido en memorial de García Márquez y espacio cultural activo, administrado por el Observatorio del Patrimonio Cultural (OPC) de la Universidad de Cartagena. Alberga la Librería Remedios la Bella (FCE Colombia), el café Fruto Bendito, un memorial permanente de García Márquez con sus cenizas y objetos personales, y exposiciones artísticas rotativas. Uno de los espacios de programación cultural gratuita más activos de Cartagena — el Espacio Cultural organiza lecturas, conciertos, presentaciones de libros, talleres, ferias artesanales y clubes de lectura durante todo el mes. Abierto de lunes a sábado, 9am–12pm y 2pm–6pm. Entrada libre. También es un lugar de trabajo verificado."
