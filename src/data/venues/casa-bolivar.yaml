description: "A cultural house run by Colombia's Ministry of Culture (Mincultura), dedicated to culture, heritage, and historical memory. Runs a full weekly program of free workshops in performing arts, visual arts, crafts, music, dance, and literature. One of the most active free cultural spaces in Cartagena's historic center — and one of the least covered in English."
description_es: "Casa cultural administrada por el Ministerio de Cultura de Colombia, dedicada a la cultura, el patrimonio y la memoria histórica. Ofrece un programa semanal completo de talleres gratuitos en artes escénicas, artes plásticas, artesanías, música, danza y literatura. Uno de los espacios culturales gratuitos más activos del centro histórico de Cartagena."
