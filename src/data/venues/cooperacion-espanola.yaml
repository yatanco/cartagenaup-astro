description: "A Spanish cooperation cultural center inside a colonial cloister on Plaza Santo Domingo, run by AECID (Agencia Española de Cooperación Internacional para el Desarrollo). Houses a public library and hosts cultural programming open to the community. Most visitors to the plaza walk past without realizing it's open to the public."
description_es: "Un centro cultural de la cooperación española dentro de un claustro colonial en la Plaza Santo Domingo, administrado por la AECID (Agencia Española de Cooperación Internacional para el Desarrollo). Alberga una biblioteca pública y ofrece programación cultural abierta a la comunidad. La mayoría de visitantes a la plaza pasan de largo sin saber que está abierto al público."
