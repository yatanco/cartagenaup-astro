description: "Cartagena's most famous salsa club — a Getsemaní institution known worldwide. Live salsa orchestras nightly from 9pm, packed on weekends with locals and international visitors. The ground floor is the club; upstairs is Havana Restaurant & Cigar Club for dining before the night starts. Hosts major annual events including anniversary concerts with orchestras from Cali and beyond. The place in Cartagena if you want to dance salsa."
description_es: "El club de salsa más famoso de Cartagena — una institución de Getsemaní conocida en todo el mundo. Orquestas de salsa en vivo todas las noches desde las 9pm, lleno de locales y visitantes internacionales los fines de semana. La planta baja es el club; arriba está Havana Restaurant & Cigar Club para cenar antes de que empiece la noche. Organiza grandes eventos anuales con orquestas de Cali y otras ciudades. El lugar en Cartagena para bailar salsa."
