description: "French-Colombian cultural center on Plaza Fernández de Madrid — one of the most beautiful squares in Cartagena's historic center. Houses a public library, a courtyard café, and runs cultural programming including film, language events, workshops, and tech meetups. The open colonial courtyard with white arches and string lights is also a verified work spot with exceptionally fast WiFi (367 Mbps)."
description_es: "Centro cultural franco-colombiano en la Plaza Fernández de Madrid — una de las plazas más hermosas del centro histórico de Cartagena. Alberga una biblioteca pública, un café de patio y ofrece programación cultural incluyendo cine, eventos de idiomas, talleres y meetups de tecnología. El patio colonial abierto con arcos blancos es también un lugar de trabajo verificado con WiFi excepcionalmente rápido (367 Mbps)."
